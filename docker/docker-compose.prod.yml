name: spotify

services:
  spotify-web:
    image: ${IMAGE:-ghcr.io/vtietz/listmagify:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
      target: prod
      args:
        # Contact info for Imprint/Privacy pages (rendered at build time)
        - CONTACT_NAME=${CONTACT_NAME}
        - CONTACT_STREET=${CONTACT_STREET}
        - CONTACT_POSTAL_CODE=${CONTACT_POSTAL_CODE}
        - CONTACT_CITY=${CONTACT_CITY}
        - CONTACT_COUNTRY=${CONTACT_COUNTRY}
        - CONTACT_EMAIL=${CONTACT_EMAIL}
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env
    volumes:
      - ../data:/usr/src/app/data
    restart: unless-stopped

  sync-worker:
    image: ${IMAGE:-ghcr.io/vtietz/listmagify:latest}
    environment:
      - NODE_ENV=production
      - SYNC_SCHEDULER_ENABLED=true
      - TOKEN_KEEPALIVE_ENABLED=true
    env_file:
      - ../.env
    volumes:
      - ../data:/usr/src/app/data
    command: ["sh", "-c", "node scripts/migrate.js && node dist/services/sync-worker/index.js"]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
