services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: sbs-web:dev
    working_dir: /usr/src/app
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      - PORT=${PORT:-3000}
      - PLAYWRIGHT_BROWSERS_PATH=/usr/src/app/.cache/ms-playwright
      - PLAYWRIGHT_HTML_OPEN=never
      # Fix HMR WebSocket connection in Docker - tell Next.js the external hostname
      - HOSTNAME=0.0.0.0
      # Disable strict SSL for local development (fixes proxy/VPN certificate issues)
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - ..:/usr/src/app:cached
      # Bind mount node_modules so VS Code can see types on host
      - ../node_modules:/usr/src/app/node_modules:cached
      - ../data:/usr/src/app/data
    command:
      - sh
      - -lc
      - >
        corepack prepare pnpm@latest --activate &&
        node scripts/show-config.js &&
        echo "[startup] Running database migrations..." &&
        pnpm exec tsx scripts/migrate.ts &&
        pnpm exec next dev --hostname 0.0.0.0 -p ${PORT:-3000}
    tty: true

  sync-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: sbs-web:dev
    working_dir: /usr/src/app
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - SYNC_SCHEDULER_ENABLED=true
      - TOKEN_KEEPALIVE_ENABLED=true
    volumes:
      - ..:/usr/src/app:cached
      - ../node_modules:/usr/src/app/node_modules:cached
      - ../data:/usr/src/app/data
    command:
      - sh
      - -lc
      - >
        corepack prepare pnpm@latest --activate &&
        pnpm exec tsx scripts/migrate.ts &&
        pnpm exec tsx services/sync-worker/index.ts
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    depends_on:
      - web

  prod:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
      target: prod
      args:
        - NEXTAUTH_URL=${NEXTAUTH_URL}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
        - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
    image: sbs-web:prod
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env

  # E2E Test Services (profile: test)
  web-test:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dev
    image: sbs-web:dev
    working_dir: /usr/src/app
    ports:
      - "3100:3100"
    env_file:
      - ../.env.test
    environment:
      - NODE_ENV=development
      - NEXT_DIST_DIR=.next-e2e
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      - HOSTNAME=0.0.0.0
      - PLAYWRIGHT_BROWSERS_PATH=/usr/src/app/.cache/ms-playwright
      - PLAYWRIGHT_HTML_OPEN=never
    volumes:
      - ..:/usr/src/app:cached
      - ../node_modules:/usr/src/app/node_modules:cached
    command:
      - sh
      - -lc
      - >
        corepack prepare pnpm@latest --activate &&
        echo "[E2E Mode] Starting test server on port 3100" &&
        pnpm exec next dev --hostname 0.0.0.0 -p 3100
    depends_on:
      - spotify-mock
      - tidal-mock
    networks:
      - test-network

  spotify-mock:
    profiles: ["test"]
    build:
      context: ..  # Build from root to access docker/mock/server.js
      dockerfile: docker/mock/Dockerfile
    ports:
      - "8081:8080"  # Expose for local debugging
    volumes:
      - ../tests/fixtures:/app/fixtures:ro  # Mount fixtures for instant updates
    command:
      - node
      - server.js
    networks:
      - test-network

  tidal-mock:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: docker/mock/Dockerfile
    ports:
      - "8082:8081"
    command:
      - node
      - tidal-server.js
    networks:
      - test-network

  playwright-runner:
    profiles: ["test"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.playwright
    image: sbs-playwright:dev
    working_dir: /work
    environment:
      - BASE_URL=http://web-test:3100
      - CI=true
      - PLAYWRIGHT_ARGS=
      - PLAYWRIGHT_BROWSERS_PATH=/work/.cache/ms-playwright
      - PLAYWRIGHT_HTML_OPEN=never
    volumes:
      - ..:/work:cached
      - ../node_modules:/work/node_modules:cached  # Use bind mount for node_modules
    command: >
      sh -c "
        rm -rf test-results .playwright-artifacts-* &&
        if ! ls /work/.cache/ms-playwright/chromium-* >/dev/null 2>&1; then
          pnpm exec playwright install chromium;
        fi &&
        pnpm exec playwright test $$PLAYWRIGHT_ARGS
      "
    depends_on:
      - web-test
      - spotify-mock
      - tidal-mock
    networks:
      - test-network

networks:
  test-network:
    driver: bridge